name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: appkit/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: appkit

      - name: Build all packages
        run: pnpm build
        working-directory: appkit

      - name: Run tests
        run: pnpm test
        working-directory: appkit

      - name: Typecheck
        run: pnpm typecheck
        working-directory: appkit
